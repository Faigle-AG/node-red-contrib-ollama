<script type="text/javascript">
    RED.nodes.registerType('ollama', {
        category: 'ai processing',
        color: '#a6bbcf',
        defaults: {
            name: { value: '' },
            host: { value: 'http://localhost:11434', required: true },
            model: { value: 'llama3', required: true },
            promptTemplate: { value: '' },
            inputProperty: {
                value: 'payload',
                validate: function (v) {
                    if (!v || v.trim() === '') return false;
                    var builtInValidator = RED.validators.typedInput('inputPropertyType');
                    return builtInValidator.call(this, v);
                },
            },
            inputPropertyType: { value: 'msg' },
            outputProperty: {
                value: 'payload',
                validate: function (v) {
                    if (!v || v.trim() === '') return false;
                    var builtInValidator = RED.validators.typedInput('outputPropertyType');
                    return builtInValidator.call(this, v);
                },
            },
            outputPropertyType: { value: 'msg' },
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-commenting-o',
        label: function () {
            return this.name || 'ollama';
        },
        oneditprepare: function () {
            $('#node-input-inputProperty').typedInput({
                default: 'msg',
                types: ['msg', 'flow', 'global', 'str', 'jsonata', 'env'],
                typeField: $('#node-input-inputPropertyType'),
            });
            $('#node-input-outputProperty').typedInput({
                default: 'msg',
                types: ['msg', 'flow', 'global'],
                typeField: $('#node-input-outputPropertyType'),
            });
        },
    });
</script>

<!-- prettier-ignore -->
<script type="text/markdown" data-help-name="ollama">
A node to execute prompts against a local Ollama instance.

### Properties

- **Host** _string_\
  The URL to your Ollama API (e.g., `http://localhost:11434`).

- **Model** _string_\
  The name of the downloaded model to use (e.g., `llama3`, `mistral`).

- **System Prompt** _string_\
  The instructions prepended to the input data before sending to Ollama.

- **Input Data** _string | msg | flow | global | jsonata | env_\
  The property containing the data to append to your prompt.

- **Output To** _msg | flow | global_\
  The destination property where the AI's response will be written.
</script>
